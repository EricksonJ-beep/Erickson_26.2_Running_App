# Builds the native Android shell (Capacitor, Phase 2) into a sideloadable APK.
# Run it from the Actions tab ("Run workflow") or by pushing an android-v* tag;
# the APK appears as a downloadable artifact on the run page.
#
# Signing: uses android/signing/erickson-release.keystore with the
# KEYSTORE_PASSWORD repo secret. Without the secret the build still passes but
# the APK is unsigned (not installable) — set the secret before a real release.
name: Android APK

on:
  workflow_dispatch:
  push:
    tags: ["android-v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: erickson-26-2/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        working-directory: erickson-26-2
        run: npm ci

      - name: Sync Capacitor
        working-directory: erickson-26-2
        run: npx cap sync android

      - name: Build APK
        working-directory: erickson-26-2/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          chmod +x gradlew
          if [ -n "$KEYSTORE_PASSWORD" ]; then
            export KEYSTORE_FILE="$GITHUB_WORKSPACE/erickson-26-2/android/signing/erickson-release.keystore"
            export KEY_ALIAS=erickson262
            export KEY_PASSWORD="$KEYSTORE_PASSWORD"
            echo "Signing with the release keystore."
          else
            echo "::warning::KEYSTORE_PASSWORD secret not set - building an UNSIGNED apk (toolchain check only, not installable)."
          fi
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: erickson-26-2-apk
          path: erickson-26-2/android/app/build/outputs/apk/release/app-release*.apk
          if-no-files-found: error
